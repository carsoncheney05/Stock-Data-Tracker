<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Porfolio Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Stock Portfolio Tracker</h1>

    <sections class="summary">
        <div class ="summary-card">
            <h2>Total Invested</h2>
            <p id="total-value">$0.00</p>
        </div>
        <div class ="summary-card">
            <h3>Total Current Value</h3>
            <p id="total-current-value">$0.00</p>`
        <div class ="summary-card">
            <h3>Total Gain/Loss</h3>
            <p id="total-gain-loss">$0.00</p>
        </div>
    </sections>

    <sections class="form-section">
        <h2>Add Stock</h2>
        <form id="stock-form">
            <input type="text" id="ticker" placeholder="Ticker Symbol (e.g. AAPL)" required>
            <input type="number" id="shares" placeholder="Shares" step="0.01" required>
            <input type="number" id="buy-price" placeholder="Buy Price" step="0.01" required>
            <input type="date" id="purchase-date" required>
            <button type="submit">Add Purchase</button>
        </form>
    </sections>

    <section class="table-section">
        <h2>Portfolio</h2>
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Shares</th>
                    <th>Buy Price</th>
                    <th>Current Price</th>
                    <th>Invested</th>
                    <th>Current Value</th>
                    <th>Gain/Loss</th>
                    <th>Purchase Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="holdings-body"></tbody>
        </table>
     </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
