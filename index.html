<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
    <h1>Stock Portfolio Tracker</h1>

    <section class="summary">
        <div class ="summary-card">
            <h2>Total Invested</h2>
            <p id="total-value">$0.00</p>
        </div>
        <div class ="summary-card">
            <h2>Total Current Value</h2>
            <p id="total-current-value">$0.00</p>
        </div>

        <div class ="summary-card">
            <h2>Total Gain/Loss</h2>
            <p id="total-gain-loss">$0.00</p>
        </div>

        
    </section>

    <section class="chart-section">
        <h2>Portfolio Allocation</h2>
        <canvas id="portfolio-chart"></canvas>
    </section>
    

    <section class="form-section">
        <h2>Add Stock</h2>
        <form id="stock-form">

            <div class="search-wrapper">
                <input type="text" id="stock-search" placeholder="Search company or stock (Apple, Tesla, Microsoft)" />
                <div id="search-results" class="search-results"></div>
            </div> 
            <div class="stock-chart-wrapper">
                <canvas id="stock-price-chart"></canvas>
            </div>

            <input type="text" id="ticker" placeholder="Ticker Symbol" required />
            <input type="number" id="shares" placeholder="Shares" step="0.01" required />
            <input type="number" id="buy-price" placeholder="Buy Price" step="0.01" required />
            <input type="date" id="purchase-date" required />
            <button type="submit">Add Purchase</button>
        </form>
    </section>

    <section class="table-section">
        <h2>Portfolio</h2>
        <table id="portfolio-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Shares</th>
                    <th>Buy Price</th>
                    <th>Current Price</th>
                    <th>Invested</th>
                    <th>Current Value</th>
                    <th>Gain/Loss</th>
                    <th>Purchase Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="holdings-body"></tbody>
        </table>
     </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
